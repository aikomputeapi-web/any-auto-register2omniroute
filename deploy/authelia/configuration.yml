---
# Authelia configuration for nowrouter.info
#
# Secrets are NOT stored here — they are injected via environment
# variables in deploy/docker-compose.yml (mapped by Authelia's
# AUTHELIA_* env-var override mechanism). See deploy/.env.example.

theme: dark

server:
  address: 'tcp://0.0.0.0:9091'

log:
  level: info
  format: text

totp:
  disable: false
  issuer: 'AccountManager'

webauthn:
  disable: false

authentication_backend:
  password_reset:
    disable: false
  file:
    path: /config/users.yml
    password:
      algorithm: argon2id
      iterations: 3
      memory: 65536
      parallelism: 4
      key_length: 32
  refresh_interval: '1m'

access_control:
  default_policy: two_factor
  rules:
    - domain: 'auth.nowrouter.info'
      policy: bypass
    - domain: 'nowrouter.info'
      policy: two_factor

session:
  name: authelia_session
  cookies:
    - domain: 'nowrouter.info'
      authelia_url: 'https://auth.nowrouter.info'
      default_redirection_url: 'https://nowrouter.info'
      same_site: 'lax'
      inactivity: '5m'
      expiration: '1h'
      remember_me: '30d'
  redis:
    host: 'redis'
    port: 6379
    maximum_active_connections: 8

regulation:
  modes:
    - 'user'
  max_retries: 5
  find_time: '2m'
  ban_time: '15m'

storage:
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt
  # --- Enable email-based notifications (password reset / 2FA backup) ---
  # 1. Remove the `notifier.filesystem` block above.
  # 2. Add the AUTHELIA_NOTIFIER_SMTP_* variables to the authelia service
  #    environment in deploy/docker-compose.yml.
  # Authelia's env-var override will then construct the smtp notifier from
  # AUTHELIA_NOTIFIER_SMTP_HOST/PORT/USERNAME/PASSWORD/SENDER.

# Secrets injected by Authelia env-var overrides:
#   AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET
#   AUTHELIA_SESSION_SECRET
#   AUTHELIA_STORAGE_ENCRYPTION_KEY
