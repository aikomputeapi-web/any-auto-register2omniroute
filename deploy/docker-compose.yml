name: apps

# Multi-app VPS stack: Caddy (auto-HTTPS reverse proxy) + any-auto-register
# (+ optional 2nd instance "pro" and a bank-statement-generator).
#
# Layout this expects on the VPS (see deploy/README.md):
#   /opt/apps/
#   ├── any-auto-register/        <- this repo
#   ├── any-auto-register-pro/    <- optional, clone of the pro repo
#   ├── bank-statement-generator/ <- optional
#   └── deploy/                   <- this directory (can live inside any-auto-register)
#
# Start everything:   docker compose --profile pro --profile bank up -d --build
# Start core only:     docker compose up -d --build
# (profiles are opt-in; caddy + any-auto-register always run)

services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [web]
    depends_on: [any-auto-register, authelia]

  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    restart: unless-stopped
    environment:
      # Secrets are injected from deploy/.env (never committed to the image).
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET: ${AUTHELIA_JWT_SECRET:?missing AUTHELIA_JWT_SECRET}
      AUTHELIA_SESSION_SECRET: ${AUTHELIA_SESSION_SECRET:?missing AUTHELIA_SESSION_SECRET}
      AUTHELIA_STORAGE_ENCRYPTION_KEY: ${AUTHELIA_STORAGE_SECRET:?missing AUTHELIA_STORAGE_SECRET}
      TZ: ${TZ:-UTC}
      # --- SMTP for email notifications (password reset / 2FA backup) ---
      # To enable: fill the AUTHELIA_NOTIFIER_SMTP_* vars in .env AND remove
      # the `notifier.filesystem` block in authelia/configuration.yml, then
      # uncomment the AUTHELIA_NOTIFIER_SMTP_* lines below.
      # AUTHELIA_NOTIFIER_SMTP_HOST: ${AUTHELIA_NOTIFIER_SMTP_HOST:-}
      # AUTHELIA_NOTIFIER_SMTP_PORT: ${AUTHELIA_NOTIFIER_SMTP_PORT:-587}
      # AUTHELIA_NOTIFIER_SMTP_USERNAME: ${AUTHELIA_NOTIFIER_SMTP_USERNAME:-}
      # AUTHELIA_NOTIFIER_SMTP_PASSWORD: ${AUTHELIA_NOTIFIER_SMTP_PASSWORD:-}
      # AUTHELIA_NOTIFIER_SMTP_SENDER: ${AUTHELIA_NOTIFIER_SMTP_SENDER:-}
    volumes:
      - ./authelia:/config
    networks: [web]
    expose:
      - "9091"
    depends_on: [redis]

  redis:
    image: redis:7-alpine
    container_name: authelia-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    networks: [web]

  any-auto-register:
    build:
      context: ${AAR_CONTEXT:-..}
      dockerfile: Dockerfile
      args:
        CAMOUFOX_VERSION: ${CAMOUFOX_VERSION:-135.0.1}
        CAMOUFOX_RELEASE: ${CAMOUFOX_RELEASE:-beta.24}
    image: any-auto-register:latest
    container_name: any-auto-register
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: "8000"
      APP_RELOAD: "0"
      APP_CONDA_ENV: docker
      APP_RUNTIME_DIR: /runtime
      APP_ENABLE_SOLVER: ${APP_ENABLE_SOLVER:-1}
      SOLVER_PORT: "8889"
      SOLVER_BIND_HOST: 0.0.0.0
      LOCAL_SOLVER_URL: http://127.0.0.1:8889
      SOLVER_BROWSER_TYPE: ${SOLVER_BROWSER_TYPE:-camoufox}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-}
      # Identity & CORS (auth is delegated to Authelia via Caddy forward_auth).
      APP_REQUIRE_PROXY_AUTH: "1"
      APP_TRUSTED_REMOTE_USER_HEADER: ${APP_TRUSTED_REMOTE_USER_HEADER:-Remote-User}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-https://nowrouter.info,https://auth.nowrouter.info}
    volumes:
      - ${AAR_DATA:-./data/any-auto-register}:/runtime
      - ${AAR_EXT:-./_ext_targets/any-auto-register}:/_ext_targets
    expose:
      - "8000"
    shm_size: "1gb"
    networks: [web]

  any-auto-register-pro:
    profiles: ["pro"]
    build:
      context: ${AARPRO_CONTEXT:-../any-auto-register-pro}
      dockerfile: Dockerfile
      args:
        CAMOUFOX_VERSION: ${CAMOUFOX_VERSION:-135.0.1}
        CAMOUFOX_RELEASE: ${CAMOUFOX_RELEASE:-beta.24}
    image: any-auto-register-pro:latest
    container_name: any-auto-register-pro
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: "8000"
      APP_RELOAD: "0"
      APP_CONDA_ENV: docker
      APP_RUNTIME_DIR: /runtime
      APP_ENABLE_SOLVER: ${APP_ENABLE_SOLVER:-1}
      SOLVER_PORT: "8889"
      SOLVER_BIND_HOST: 0.0.0.0
      LOCAL_SOLVER_URL: http://127.0.0.1:8889
      SOLVER_BROWSER_TYPE: ${SOLVER_BROWSER_TYPE:-camoufox}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-}
    volumes:
      - ${AARPRO_DATA:-./data/any-auto-register-pro}:/runtime
      - ${AARPRO_EXT:-./_ext_targets/any-auto-register-pro}:/_ext_targets
    expose:
      - "8000"
    shm_size: "1gb"
    networks: [web]

  bank-statement-generator:
    profiles: ["bank"]
    build:
      context: ${BANK_CONTEXT:-../bank-statement-generator}
      dockerfile: Dockerfile
    image: bank-statement-generator:latest
    container_name: bank-statement-generator
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ${BANK_DATA:-./data/bank-statement-generator}:/data
    networks: [web]

networks:
  web:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  redis_data:
